services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      SQLITE_PATH: /data/reminders.db
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-UTC}
      WORKER_INTERVAL_SECONDS: ${WORKER_INTERVAL_SECONDS:-30}
      ALLOW_EVERYONE_MENTIONS: ${ALLOW_EVERYONE_MENTIONS:-false}
    volumes:
      - reminder_data:/data

  deploy-commands:
    build: .
    restart: "no"
    entrypoint: ["node", "dist/bot/deploy.js"]
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}

volumes:
  reminder_data:
